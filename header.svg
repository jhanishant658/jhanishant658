<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes typing1 {
        0%   { width: 0 }
        30%  { width: 11ch }
        70%  { width: 11ch }
        85%  { width: 0 }
        100% { width: 0 }
      }
      @keyframes typing2 {
        0%   { width: 0 }
        35%  { width: 0 }
        65%  { width: 20ch }
        80%  { width: 20ch }
        95%  { width: 0 }
        100% { width: 0 }
      }
      .cursor { animation: blink 1s step-end infinite; }
      .line1-clip { animation: typing1 6s steps(11) infinite; overflow: hidden; white-space: nowrap; display: inline-block; }
      .line2-clip { animation: typing2 6s steps(20) infinite; overflow: hidden; white-space: nowrap; display: inline-block; }
    </style>
  </defs>

  <!-- BG -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="70"  x2="900" y2="70"  stroke="#00f5ff" stroke-width="0.4" opacity="0.1"/>
  <line x1="0" y1="140" x2="900" y2="140" stroke="#00f5ff" stroke-width="0.4" opacity="0.1"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="#00f5ff" stroke-width="0.4" opacity="0.1"/>
  <line x1="180" y1="0" x2="180" y2="280" stroke="#a78bfa" stroke-width="0.4" opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="280" stroke="#a78bfa" stroke-width="0.4" opacity="0.08"/>
  <line x1="540" y1="0" x2="540" y2="280" stroke="#a78bfa" stroke-width="0.4" opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="280" stroke="#a78bfa" stroke-width="0.4" opacity="0.08"/>

  <!-- Glow orbs -->
  <circle cx="100" cy="140" r="100" fill="#00f5ff" opacity="0.03" filter="url(#softglow)"/>
  <circle cx="800" cy="140" r="100" fill="#a78bfa" opacity="0.05" filter="url(#softglow)"/>

  <!-- Corner brackets -->
  <polyline points="20,30 20,10 40,10" stroke="#00f5ff" stroke-width="2.5" fill="none" opacity="0.9"/>
  <polyline points="880,30 880,10 860,10" stroke="#00f5ff" stroke-width="2.5" fill="none" opacity="0.9"/>
  <polyline points="20,250 20,270 40,270" stroke="#a78bfa" stroke-width="2.5" fill="none" opacity="0.9"/>
  <polyline points="880,250 880,270 860,270" stroke="#a78bfa" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Dot accents -->
  <circle cx="60" cy="140" r="3" fill="#00f5ff" opacity="0.6"/>
  <circle cx="840" cy="140" r="3" fill="#a78bfa" opacity="0.6"/>

  <!-- Top glow line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#glowLine)" opacity="0.9"/>

  <!-- NAME - glow layer -->
  <text x="450" y="118" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="bold"
        text-anchor="middle" fill="#00f5ff" opacity="0.2" filter="url(#softglow)">Nishant Jha</text>
  <!-- NAME - main -->
  <text x="450" y="118" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="bold"
        text-anchor="middle" fill="#00f5ff" filter="url(#glow)">Nishant Jha</text>

  <!-- Subtitle line 1 -->
  <text x="450" y="162" font-family="'Courier New',Courier,monospace" font-size="19"
        text-anchor="middle" fill="#a78bfa">Full Stack Developer  |  Java &amp; Spring Boot</text>

  <!-- Typing line 2 with animated cursor -->
  <text x="450" y="200" font-family="'Courier New',Courier,monospace" font-size="16"
        text-anchor="middle" fill="#e2e8f0" opacity="0.75">Building Scalable Microservices 🚀 | LeetCode 400+ 🔥</text>

  <!-- Bottom glow line -->
  <rect x="0" y="277" width="900" height="3" fill="url(#glowLine)" opacity="0.7"/>

  <!-- Divider accent -->
  <line x1="300" y1="135" x2="600" y2="135" stroke="#00f5ff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="450" cy="135" r="3" fill="#00f5ff" opacity="0.5"/>
</svg>
