<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes scanline { 0%{transform:translateY(-10px)} 100%{transform:translateY(330px)} }
      .orb1 { animation: pulse 4s ease-in-out infinite; }
      .orb2 { animation: pulse 4s ease-in-out infinite 2s; }
      .scan { animation: scanline 6s linear infinite; }
    </style>
    <radialGradient id="orb-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glowH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00f5ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameglow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="900" height="320" fill="#0f0c29"/>

  <!-- Grid -->
  <line x1="0" y1="64"  x2="900" y2="64"  stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="128" x2="900" y2="128" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="192" x2="900" y2="192" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="256" x2="900" y2="256" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="180" y1="0" x2="180" y2="320" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="360" y1="0" x2="360" y2="320" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="540" y1="0" x2="540" y2="320" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="720" y1="0" x2="720" y2="320" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Scanline -->
  <rect class="scan" x="0" y="0" width="900" height="2" fill="#00f5ff" opacity="0.04"/>

  <!-- Orbs -->
  <ellipse class="orb1" cx="120" cy="130" rx="160" ry="130" fill="url(#orb-c)"/>
  <ellipse class="orb2" cx="780" cy="130" rx="160" ry="130" fill="url(#orb-p)"/>

  <!-- Top glow bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#glowH)"/>

  <!-- Corner brackets -->
  <polyline points="22,38 22,14 46,14" stroke="#00f5ff" stroke-width="2.5" fill="none" opacity="0.85"/>
  <polyline points="878,38 878,14 854,14" stroke="#00f5ff" stroke-width="2.5" fill="none" opacity="0.85"/>
  <polyline points="22,282 22,306 46,306" stroke="#a78bfa" stroke-width="2.5" fill="none" opacity="0.85"/>
  <polyline points="878,282 878,306 854,306" stroke="#a78bfa" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Corner dots -->
  <circle cx="22" cy="14" r="3" fill="#00f5ff" opacity="0.9"/>
  <circle cx="878" cy="14" r="3" fill="#00f5ff" opacity="0.9"/>
  <circle cx="22" cy="306" r="3" fill="#a78bfa" opacity="0.9"/>
  <circle cx="878" cy="306" r="3" fill="#a78bfa" opacity="0.9"/>

  <!-- Name -->
  <text x="450" y="108" font-family="'Courier New',Courier,monospace" font-size="62" font-weight="bold"
        text-anchor="middle" fill="url(#nameglow)">Nishant Jha</text>

  <!-- Divider -->
  <line x1="280" y1="122" x2="620" y2="122" stroke="url(#glowH)" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="450" y="152" font-family="'Courier New',Courier,monospace" font-size="17"
        text-anchor="middle" fill="#a78bfa" opacity="0.95">Full Stack Developer  |  Java &amp; Spring Boot  |  Microservices</text>

  <!-- Tagline -->
  <text x="450" y="180" font-family="'Courier New',Courier,monospace" font-size="13"
        text-anchor="middle" fill="#8892b0">LeetCode 400+  ·  100+ Real Users  ·  Open to Opportunities</text>

  <!-- LinkedIn -->
  <a href="https://linkedin.com/in/nishant-jha-0b96a629b">
    <rect x="162" y="210" width="130" height="38" rx="6" fill="#0A66C2"/>
    <text x="227" y="234" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold"
          text-anchor="middle" fill="#ffffff">in  LinkedIn</text>
  </a>

  <!-- LeetCode -->
  <a href="https://leetcode.com/jhanishant18">
    <rect x="308" y="210" width="130" height="38" rx="6" fill="#FFA116"/>
    <text x="373" y="234" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold"
          text-anchor="middle" fill="#1a1a1a">{ } LeetCode</text>
  </a>

  <!-- Portfolio -->
  <a href="https://my-port-folio-coral-six.vercel.app/">
    <rect x="454" y="210" width="130" height="38" rx="6" fill="#00f5ff" opacity="0.15"/>
    <rect x="454" y="210" width="130" height="38" rx="6" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.8"/>
    <text x="519" y="234" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold"
          text-anchor="middle" fill="#00f5ff">&#9654; Portfolio</text>
  </a>

  <!-- Gmail -->
  <a href="mailto:njha5901@gmail.com">
    <rect x="600" y="210" width="138" height="38" rx="6" fill="#D14836"/>
    <text x="669" y="234" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold"
          text-anchor="middle" fill="#ffffff">@ Gmail</text>
  </a>

  <!-- Bottom glow bar -->
  <rect x="0" y="317" width="900" height="3" fill="url(#glowH)"/>
</svg>
